<!DOCTYPE html>
<html>
<head>
<title>Scholarships | Evolvex College</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- SAME NAVBAR -->

<div class="container py-5">

<h1 class="text-center mb-4">Scholarship Programs</h1>

<p>We offer merit and need-based scholarships for selected programs.</p>

<h3 class="mt-5">Scholarship Application Form</h3>

<form class="row g-3">

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Scholarship Course</label>
<select class="form-select">
<option>Software Engineering</option>
<option>Graphic Design</option>
<option>Cyber Security</option>
<option>Digital Marketing & AI</option>
<option>Virtual Assistant</option>
<option>Data Science</option>
<option>Data Analysis</option>
<option>Artificial Intelligence</option>
<option>Social Media Marketing</option>
<option>ICDL</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Why do you deserve this scholarship?</label>
<textarea class="form-control"></textarea>
</div>

<div class="col-12">
<button class="btn btn-warning">Submit Scholarship Application</button>
</div>

</form>

</div>

</body>
<!-- Back to Home Button -->
<div class="text-center my-4">
  <a href="index.html" class="btn btn-warning btn-lg">Back to Home</a>
</div>

</html>
